<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live P&L — ChiveIQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0ebe0;
    }
    .header { padding: 24px 40px; border-bottom: 1px solid rgba(43, 168, 84, 0.15); }
    .back-link { color: #2ba854; text-decoration: none; font-size: 13px; font-weight: 600; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
    h1 { font-size: 36px; margin-bottom: 32px; }
    .time-filter { margin-bottom: 32px; display: flex; gap: 8px; }
    .time-btn { padding: 8px 16px; background: transparent; border: 1px solid rgba(43, 168, 84, 0.2); color: #a8a8a8; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .time-btn.active { background: #2ba854; color: #0a0a0a; border-color: #2ba854; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px; }
    .kpi-card {
      padding: 24px;
      border: 1px solid rgba(43, 168, 84, 0.2);
      border-radius: 8px;
      background: rgba(43, 168, 84, 0.05);
    }
    .kpi-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #717182; margin-bottom: 8px; }
    .kpi-value { font-size: 32px; font-weight: 700; color: #2ba854; }
    .kpi-change { font-size: 12px; color: #43d575; margin-top: 8px; }
    .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; margin-bottom: 40px; }
    .chart {
      padding: 24px;
      border: 1px solid rgba(43, 168, 84, 0.2);
      border-radius: 8px;
      background: rgba(43, 168, 84, 0.05);
    }
    .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
    .bar {
      flex: 1;
      background: linear-gradient(180deg, #2ba854, #1e7145);
      border-radius: 4px;
      opacity: 0.8;
    }
    .bar:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-link">← Back</a>
  </div>
  <div class="container">
    <h1>Live P&L Dashboard</h1>
    
    <div class="time-filter">
      <button class="time-btn">Today</button>
      <button class="time-btn active">7 Days</button>
      <button class="time-btn">30 Days</button>
      <button class="time-btn">YTD</button>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Gross Sales</div>
        <div class="kpi-value">$42,580</div>
        <div class="kpi-change">↑ 12% vs last week</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Food Cost %</div>
        <div class="kpi-value">28.5%</div>
        <div class="kpi-change">↓ 1.2% improvement</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Labor Cost %</div>
        <div class="kpi-value">32.1%</div>
        <div class="kpi-change">↑ 2.3% above target</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Net Profit %</div>
        <div class="kpi-value">21.8%</div>
        <div class="kpi-change">↑ 8.5% vs last week</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart">
        <div class="chart-title">Daily Revenue</div>
        <div class="chart-bars">
          <div class="bar" style="height: 60%;"></div>
          <div class="bar" style="height: 75%;"></div>
          <div class="bar" style="height: 85%;"></div>
          <div class="bar" style="height: 92%;"></div>
          <div class="bar" style="height: 88%;"></div>
          <div class="bar" style="height: 95%;"></div>
          <div class="bar" style="height: 70%;"></div>
        </div>
      </div>

      <div class="chart">
        <div class="chart-title">Profit Margin Trend</div>
        <div class="chart-bars">
          <div class="bar" style="height: 55%;"></div>
          <div class="bar" style="height: 60%;"></div>
          <div class="bar" style="height: 65%;"></div>
          <div class="bar" style="height: 68%;"></div>
          <div class="bar" style="height: 72%;"></div>
          <div class="bar" style="height: 80%;"></div>
          <div class="bar" style="height: 85%;"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
